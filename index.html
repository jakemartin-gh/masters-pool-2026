function formatScore(s) {
  if (s === null || s === undefined) return 'N/A';
  if (s === 0) return 'E';
  return s > 0 ? `+${s}` : `${s}`;
}

function scoreClass(s) {
  if (s === null || s === undefined) return 'even';
  if (s < 0) return 'under';
  if (s > 0) return 'over';
  return 'even';
}

async function fetchESPNScores() {
  try {
    const tournamentId = '401353228';
    const url = `https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?event=${tournamentId}`;
    const res = await fetch(url);
    const data = await res.json();
    const competitors = data?.events?.[0]?.competitions?.[0]?.competitors || [];
    const scores = {};
    competitors.forEach(c => {
      const name = c.athlete?.displayName;
      const score = c.score?.value ?? c.statistics?.find(s => s.name === 'score')?.displayValue;
      if (name && score !== undefined) {
        let numScore = parseInt(score);
        if (isNaN(numScore)) numScore = score === 'E' ? 0 : null;
        scores[name] = numScore;
      }
    });
    return Object.keys(scores).length > 0 ? scores : null;
  } catch(e) {
    return null;
  }
}

function computeStandings(entries, scores, field, cutLine, isCutMade) {
  return entries.map(entry => {
    const picks = [
      entry.group1_pick, entry.group2_pick, entry.group3_pick,
      entry.group4_pick, entry.group5_pick, entry.group6_pick
    ];

    const pickScores = picks.map(name => {
      const playerInfo = field.find(p => p.name === name);
      let score = scores[name];
      const isWD = score === 'WD' || score === null && playerInfo?.wd;

      if (isWD) {
        if (isCutMade) return { name, score: 10, status: 'wd' };
        return { name, score: cutLine + 5, status: 'wd' };
      }

      if (score === null || score === undefined) score = 0;

      if (isCutMade && score > cutLine) {
        return { name, score: cutLine, status: 'cut' };
      }

      return { name, score, status: 'active' };
    });

    pickScores.sort((a, b) => a.score - b.score);

    const worstIdx = pickScores.length - 1;
    const droppedPick = pickScores[worstIdx];
    const countedPicks = pickScores.slice(0, 5);
    const totalScore = countedPicks.reduce((sum, p) => sum + p.score, 0);

    return {
      ...entry,
      pickScores,
      droppedPick,
      countedPicks,
      totalScore
    };
  }).sort((a, b) => a.totalScore - b.totalScore);
}

function App() {
  const [view, setView] = useState('standings');
  const [adminLoggedIn, setAdminLoggedIn] = useState(false);
  const [entries, setEntries] = useState([]);
  const [field, setField] = useState(MOCK_FIELD);
  const [scores, setScores] = useState(MOCK_SCORES);
  const [useMockData, setUseMockData] = useState(true);
  const [lastUpdated, setLastUpdated] = useState(null);
  const [nextUpdate, setNextUpdate] = useState(null);
  const [isUpdating, setIsUpdating] = useState(false);
  const [cutLine, setCutLine] = useState(CUT_LINE_DEFAULT);
  const [isCutMade, setIsCutMade] = useState(false);
  const [actualBirdieCount, setActualBirdieCount] = useState('');
  const intervalRef = useRef(null);

  const loadEntries = useCallback(async () => {
    try {
      const data = await supabase.query('entries', { select: '*', order: 'created_at.asc' });
      if (Array.isArray(data)) setEntries(data);
    } catch(e) {}
  }, []);

  const loadField = useCallback(async () => {
    try {
      const data = await supabase.query('player_groups', { select: '*', order: 'group_number.asc,owgr.asc' });
      if (Array.isArray(data) && data.length > 0) setField(data);
    } catch(e) {}
  }, []);

  const refreshScores = useCallback(async () => {
    setIsUpdating(true);
    const now = new Date();
    setLastUpdated(now);
    setNextUpdate(new Date(now.getTime() + UPDATE_INTERVAL));

    if (!useMockData) {
      const espnScores = await fetchESPNScores();
      if (espnScores) setScores(espnScores);
    }
    setIsUpdating(false);
  }, [useMockData]);

  useEffect(() => {
    loadEntries();
    loadField();
    refreshScores();
    intervalRef.current = setInterval(refreshScores, UPDATE_INTERVAL);
    return () => clearInterval(intervalRef.current);
  }, []);

  const standings = computeStandings(entries, scores, field, cutLine, isCutMade);

  const groupedField = [1,2,3,4,5,6].map(g => ({
    group: g,
    players: field.filter(p => p.group_number === g || p.group === g)
  }));

  const amateurs = field.filter(p => p.is_amateur);

  const formatTime = (d) => d ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '--';

  return (
    <div>
      <div className="header">
        <div className="header-inner">
          <div className="header-title">
            <div className="header-logo">⛳</div>
            <div>
              <h1>Masters Pick Em 2026</h1>
              <div className="header-sub">Augusta National · April 10–13, 2026</div>
            </div>
          </div>
          <div className="nav">
            <button className={view === 'standings' ? 'active' : ''} onClick={() => setView('standings')}>Standings</button>
            <button className={view === 'leaderboard' ? 'active' : ''} onClick={() => setView('leaderboard')}>Leaderboard</button>
            <button className={view === 'enter' ? 'active' : ''} onClick={() => setView('enter')}>Enter Pool</button>
            <button className={view === 'admin' ? 'active' : ''} onClick={() => setView('admin')}>Admin</button>
          </div>
        </div>
      </div>

      <div className="main">
        {useMockData && (
          <div className="mock-banner">
            Demo mode — using simulated scores. Switch to live data in Admin panel when tournament begins.
          </div>
        )}

        <div className="status-bar">
          <div className={`status-dot ${isUpdating ? 'stale' : ''}`}></div>
          <span>{isUpdating ? 'Updating...' : 'Live'}</span>
          <span style={{color:'rgba(255,255,255,0.5)'}}>|</span>
          <span>Last updated: {formatTime(lastUpdated)}</span>
          <span style={{color:'rgba(255,255,255,0.5)'}}>|</span>
          <span>Next update: {formatTime(nextUpdate)}</span>
          <span style={{color:'rgba(255,255,255,0.5)'}}>|</span>
          <span>{entries.length} entries</span>
          {isCutMade && <><span style={{color:'rgba(255,255,255,0.5)'}}>|</span><span>Cut: {formatScore(cutLine)}</span></>}
          <button onClick={refreshScores} style={{marginLeft:'auto',background:'rgba(255,255,255,0.15)',border:'none',color:'white',padding:'4px 12px',borderRadius:'12px',cursor:'pointer',fontSize:'11px'}}>
            Refresh Now
          </button>
        </div>

        {view === 'standings' && <StandingsView standings={standings} entries={entries} />}
        {view === 'leaderboard' && <LeaderboardView scores={scores} field={field} groupedField={groupedField} />}
        {view === 'enter' && <EntryForm groupedField={groupedField} amateurs={amateurs} onSubmit={loadEntries} />}
        {view === 'admin' && (
          <AdminView
            loggedIn={adminLoggedIn} onLogin={() => setAdminLoggedIn(true)}
            entries={entries} standings={standings} scores={scores}
            useMockData={useMockData} setUseMockData={setUseMockData}
            cutLine={cutLine} setCutLine={setCutLine}
            isCutMade={isCutMade} setIsCutMade={setIsCutMade}
            actualBirdieCount={actualBirdieCount} setActualBirdieCount={setActualBirdieCount}
            onRefresh={refreshScores}
          />
        )}
      </div>
    </div>
  );
}

function StandingsView({ standings, entries }) {
  if (entries.length === 0) {
    return (
      <div className="card">
        <div className="card-body" style={{textAlign:'center', padding:'48px'}}>
          <div style={{fontSize:'40px', marginBottom:'16px'}}>⛳</div>
          <h2 style={{color:'var(--green)', marginBottom:'8px'}}>No entries yet</h2>
          <p style={{color:'var(--text-muted)', fontSize:'14px'}}>Be the first to enter the pool!</p>
        </div>
      </div>
    );
  }

  const topScore = standings[0]?.totalScore;
  const inMoneyCount = Math.min(5, standings.length);
  const topScores = standings.slice(0, inMoneyCount).map(s => s.totalScore);
  const cutoffScore = topScores[topScores.length - 1];
  const tiedAtCutoff = standings.filter(s => s.totalScore === cutoffScore).length > 1;

  return (
    <div className="card">
      <div className="card-header">
        <h2>Pool Standings</h2>
        <div style={{display:'flex',gap:'16px',fontSize:'12px',color:'var(--text-muted)'}}>
          <span>🏆 Top 5 highlighted</span>
          <span style={{display:'flex',alignItems:'center',gap:'4px'}}><span style={{width:'10px',height:'10px',background:'rgba(192,57,43,0.2)',display:'inline-block',borderRadius:'2px'}}></span>Dropped pick</span>
        </div>
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="standings-table">
          <thead>
            <tr>
              <th style={{width:'48px'}}>Pos</th>
              <th>Participant</th>
              <th style={{width:'70px',textAlign:'center'}}>Total</th>
              <th>Picks (G1–G6) · worst dropped</th>
              <th style={{width:'90px'}}>Tiebreakers</th>
            </tr>
          </thead>
          <tbody>
            {standings.map((entry, i) => {
              const isInMoney = i < inMoneyCount;
              const isTied = isInMoney && tiedAtCutoff && entry.totalScore === cutoffScore;
              const rowClass = isTied ? 'in-money-tied' : isInMoney ? 'in-money' : '';
              return (
                <tr key={entry.id} className={rowClass}>
                  <td>
                    <div className="rank-badge" style={i===0?{background:'var(--gold)',color:'white'}:i===1?{background:'#c0c0c0',color:'white'}:i===2?{background:'#cd7f32',color:'white'}:{}}>
                      {isTied ? 'T' : ''}{i+1}
                    </div>
                  </td>
                  <td>
                    <div style={{fontWeight:'500', fontSize:'14px'}}>{entry.participant_name}</div>
                    {isInMoney && <div style={{fontSize:'10px',color:'var(--gold)',marginTop:'2px'}}>● In the money</div>}
                    {isTied && <div style={{fontSize:'10px',color:'var(--text-muted)',marginTop:'2px'}}>Tied — tiebreakers apply</div>}
                  </td>
                  <td style={{textAlign:'center'}}>
                    <span className={`score-val ${scoreClass(entry.totalScore)}`} style={{fontSize:'16px',fontWeight:'600'}}>
                      {formatScore(entry.totalScore)}
                    </span>
                  </td>
                  <td>
                    <div className="picks-row">
                      {entry.pickScores.map((p, pi) => {
                        const isDropped = p.name === entry.droppedPick?.name;
                        const chipClass = isDropped ? 'worst' : p.status === 'wd' ? 'wd' : p.status === 'cut' ? 'cut' : '';
                        return (
                          <span key={pi} className={`pick-chip ${chipClass}`} title={p.status === 'wd' ? 'Withdrawn' : p.status === 'cut' ? 'Missed Cut' : ''}>
                            {p.name.split(' ').slice(-1)[0]} {formatScore(p.score)}
                          </span>
                        );
                      })}
                    </div>
                  </td>
                  <td style={{fontSize:'11px',color:'var(--text-muted)'}}>
                    <div>Amat: {entry.tiebreaker_amateur || '—'}</div>
                    <div>Birds: {entry.tiebreaker_birdies ?? '—'}</div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function LeaderboardView({ scores, field, groupedField }) {
  const [activeGroup, setActiveGroup] = useState('all');

  const playerList = field.length > 0 ? field : MOCK_FIELD;
  const withScores = playerList
    .map(p => ({ ...p, score: scores[p.name] ?? scores[p.player_name] ?? null }))
    .filter(p => p.score !== null && p.score !== undefined)
    .sort((a, b) => a.score - b.score);

  const filtered = activeGroup === 'all' ? withScores : withScores.filter(p => (p.group_number || p.group) === parseInt(activeGroup));

  let pos = 1;
  const withPos = filtered.map((p, i) => {
    if (i > 0 && filtered[i-1].score === p.score) return { ...p, pos: filtered[i-1].pos, tied: true };
    const r = { ...p, pos, tied: false };
    pos = i + 2;
    return r;
  });

  return (
    <div className="card">
      <div className="card-header">
        <h2>Tournament Leaderboard</h2>
      </div>
      <div style={{padding:'16px 24px 0'}}>
        <div className="tabs">
          {['all',1,2,3,4,5,6].map(g => (
            <button key={g} className={`tab ${activeGroup == g ? 'active' : ''}`} onClick={() => setActiveGroup(String(g))}>
              {g === 'all' ? 'All Players' : `Group ${g}`}
            </button>
          ))}
        </div>
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="leaderboard-table">
          <thead>
            <tr>
              <th style={{width:'50px'}}>Pos</th>
              <th>Player</th>
              <th style={{width:'60px',textAlign:'center'}}>Score</th>
              <th style={{width:'60px',textAlign:'center'}}>Group</th>
              <th style={{width:'60px',textAlign:'center'}}>OWGR</th>
            </tr>
          </thead>
          <tbody>
            {withPos.map((p, i) => (
              <tr key={i}>
                <td>
                  <span className={`pos-badge ${p.tied ? 'T' : ''}`}>{p.tied ? 'T' : ''}{p.pos}</span>
                </td>
                <td>
                  <span style={{fontWeight:'500'}}>{p.name || p.player_name}</span>
                  {p.is_amateur && <span className="amateur-badge" style={{marginLeft:'6px'}}>Am</span>}
                </td>
                <td style={{textAlign:'center'}}>
                  <span className={`score-val ${scoreClass(p.score)}`} style={{fontWeight:'600'}}>
                    {formatScore(p.score)}
                  </span>
                </td>
                <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:'12px'}}>G{p.group_number || p.group}</td>
                <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:'12px'}}>{p.owgr || '—'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function EntryForm({ groupedField, amateurs, onSubmit }) {
  const [step, setStep] = useState(1);
  const [submitted, setSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [form, setForm] = useState({
    participant_name: '', email: '',
    group1_pick: '', group2_pick: '', group3_pick: '',
    group4_pick: '', group5_pick: '', group6_pick: '',
    tiebreaker_amateur: '', tiebreaker_birdies: ''
  });
  const [errors, setErrors] = useState({});

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const validateStep1 = () => {
    const e = {};
    if (!form.participant_name.trim()) e.participant_name = 'Name is required';
    if (form.email && !/\S+@\S+\.\S+/.test(form.email)) e.email = 'Invalid email';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const validateStep2 = () => {
    const e = {};
    for (let i = 1; i <= 6; i++) {
      if (!form[`group${i}_pick`]) e[`group${i}_pick`] = 'Please select a player';
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const validateStep3 = () => {
    const e = {};
    if (!form.tiebreaker_amateur) e.tiebreaker_amateur = 'Please select an amateur';
    if (!form.tiebreaker_birdies || isNaN(parseInt(form.tiebreaker_birdies))) e.tiebreaker_birdies = 'Please enter a number';
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const nextStep = () => {
    if (step === 1 && validateStep1()) setStep(2);
    if (step === 2 && validateStep2()) setStep(3);
  };

  const handleSubmit = async () => {
    if (!validateStep3()) return;
    setSubmitting(true);
    const ok = await supabase.insert('entries', {
      ...form,
      tiebreaker_birdies: parseInt(form.tiebreaker_birdies)
    });
    if (ok) {
      setSubmitted(true);
      onSubmit();
    } else {
      setErrors({ submit: 'Submission failed. Please try again.' });
    }
    setSubmitting(false);
  };

  if (submitted) {
    return (
      <div className="card">
        <div className="success-screen">
          <div className="success-icon">✓</div>
          <h2>You're in the pool!</h2>
          <p style={{marginBottom:'24px'}}>Entry submitted for <strong>{form.participant_name}</strong>. Good luck at Augusta!</p>
          <button className="btn btn-outline" onClick={() => { setSubmitted(false); setStep(1); setForm({ participant_name:'',email:'',group1_pick:'',group2_pick:'',group3_pick:'',group4_pick:'',group5_pick:'',group6_pick:'',tiebreaker_amateur:'',tiebreaker_birdies:'' }); }}>
            Submit Another Entry
          </button>
        </div>
      </div>
    );
  }

  return (
    <div className="card">
      <div className="card-header">
        <h2>Submit Your Entry</h2>
        <div style={{fontSize:'13px',color:'var(--text-muted)'}}>Step {step} of 3</div>
      </div>
      <div className="card-body">
        <div className="entry-form">
          <div style={{display:'flex',gap:'0',marginBottom:'28px'}}>
            {[1,2,3].map(s => (
              <div key={s} style={{flex:1,display:'flex',alignItems:'center'}}>
                <div style={{width:'28px',height:'28px',borderRadius:'50%',background:s<=step?'var(--green)':'var(--cream-dark)',color:s<=step?'white':'var(--text-muted)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'500',flexShrink:0}}>{s}</div>
                {s < 3 && <div style={{flex:1,height:'2px',background:s<step?'var(--green)':'var(--cream-dark)'}}></div>}
              </div>
            ))}
          </div>

          {step === 1 && (
            <div className="form-section">
              <div className="form-section-title">Your Details</div>
              <div className="form-section-sub">Enter your name and optionally your email for updates.</div>
              <div className="form-row">
                <div className="form-field">
                  <label>Your Name *</label>
                  <input value={form.participant_name} onChange={e => set('participant_name', e.target.value)} placeholder="Full name" className={errors.participant_name ? 'error' : ''} />
                  {errors.participant_name && <span className="error-msg">{errors.participant_name}</span>}
                </div>
                <div className="form-field">
                  <label>Email (optional)</label>
                  <input value={form.email} onChange={e => set('email', e.target.value)} placeholder="email@example.com" className={errors.email ? 'error' : ''} />
                  {errors.email && <span className="error-msg">{errors.email}</span>}
                </div>
              </div>
              <button className="btn btn-primary" onClick={nextStep}>Continue to Picks →</button>
            </div>
          )}

          {step === 2 && (
            <div className="form-section">
              <div className="form-section-title">Make Your Picks</div>
              <div className="form-section-sub">Select one player from each group. Players are ranked by OWGR within each group.</div>

              <div className="alert alert-info" style={{marginBottom:'16px'}}>
                <strong>Scoring:</strong> Your best 5 of 6 picks count. The worst performer is automatically dropped. After the cut, missed cut players are capped at the cut line.
              </div>

              <div className="group-grid">
                {groupedField.map(({ group, players }) => (
                  <div key={group} className="group-card">
                    <div className="group-card-header">
                      <span>Group {group}{group === 6 ? ' (Field + Amateurs)' : ''}</span>
                      {group < 6 && <span className="owgr-range">OWGR {(group-1)*10+1}–{group*10}</span>}
                    </div>
                    {players.map(p => {
                      const name = p.name || p.player_name;
                      const key = `group${group}_pick`;
                      return (
                        <label key={name} className={`group-player ${form[key] === name ? 'selected' : ''}`}>
                          <input type="radio" name={`group${group}`} value={name} checked={form[key] === name} onChange={() => set(key, name)} />
                          <span className="group-player-name">{name}</span>
                          {p.is_amateur && <span className="amateur-badge">Am</span>}
                          {p.owgr && <span className="group-player-owgr">#{p.owgr}</span>}
                        </label>
                      );
                    })}
                    {errors[`group${group}_pick`] && <div style={{padding:'6px 16px',color:'var(--red)',fontSize:'11px'}}>{errors[`group${group}_pick`]}</div>}
                  </div>
                ))}
              </div>

              <div style={{display:'flex',gap:'12px'}}>
                <button className="btn btn-outline" onClick={() => setStep(1)}>← Back</button>
                <button className="btn btn-primary" onClick={nextStep}>Continue to Tiebreakers →</button>
              </div>
            </div>
          )}

          {step === 3 && (
            <div className="form-section">
              <div className="form-section-title">Tiebreakers</div>
              <div className="form-section-sub">These are used to break ties if multiple entries finish with the same score.</div>

              <div className="form-row" style={{marginBottom:'24px'}}>
                <div className="form-field">
                  <label>Tiebreaker 1 — Low Amateur</label>
                  <select value={form.tiebreaker_amateur} onChange={e => set('tiebreaker_amateur', e.target.value)} className={errors.tiebreaker_amateur ? 'error' : ''}>
                    <option value="">Select an amateur...</option>
                    {(groupedField.find(g => g.group === 6)?.players || []).filter(p => p.is_amateur).map(p => (
                      <option key={p.name || p.player_name} value={p.name || p.player_name}>{p.name || p.player_name}</option>
                    ))}
                    {amateurs.map(p => (
                      <option key={p.name || p.player_name} value={p.name || p.player_name}>{p.name || p.player_name}</option>
                    ))}
                  </select>
                  {errors.tiebreaker_amateur && <span className="error-msg">{errors.tiebreaker_amateur}</span>}
                  <small style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>Which amateur will score lowest overall?</small>
                </div>
                <div className="form-field">
                  <label>Tiebreaker 2 — Final Round Birdies</label>
                  <input type="number" min="0" max="500" value={form.tiebreaker_birdies} onChange={e => set('tiebreaker_birdies', e.target.value)} placeholder="e.g. 178" className={errors.tiebreaker_birdies ? 'error' : ''} />
                  {errors.tiebreaker_birdies && <span className="error-msg">{errors.tiebreaker_birdies}</span>}
                  <small style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'2px'}}>Total birdies made by T10 and above in the final round</small>
                </div>
              </div>

              <div className="alert alert-warning" style={{marginBottom:'20px'}}>
                <strong>Review your picks:</strong> {[1,2,3,4,5,6].map(g => form[`group${g}_pick`] || `G${g}: none`).join(' · ')}
              </div>

              {errors.submit && <div style={{color:'var(--red)',fontSize:'13px',marginBottom:'12px'}}>{errors.submit}</div>}

              <div style={{display:'flex',gap:'12px'}}>
                <button className="btn btn-outline" onClick={() => setStep(2)}>← Back</button>
                <button className="btn btn-gold" onClick={handleSubmit} disabled={submitting}>
                  {submitting ? <div style={{display:'flex',alignItems:'center',gap:'8px'}}><div className="spinner"></div>Submitting...</div> : '🏆 Submit Entry'}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function AdminView({ loggedIn, onLogin, entries, standings, scores, useMockData, setUseMockData, cutLine, setCutLine, isCutMade, setIsCutMade, actualBirdieCount, setActualBirdieCount, onRefresh }) {
  const [pw, setPw] = useState('');
  const [pwErr, setPwErr] = useState('');
  const [adminTab, setAdminTab] = useState('controls');
  const [cutInput, setCutInput] = useState(cutLine);

  if (!loggedIn) {
    return (
      <div className="login-box">
        <div style={{fontSize:'32px',marginBottom:'12px'}}>🔒</div>
        <h2>Admin Access</h2>
        <p>Enter your admin password to manage the pool.</p>
        <div className="form-field" style={{marginBottom:'12px'}}>
          <input type="password" value={pw} onChange={e => setPw(e.target.value)} placeholder="Password" onKeyDown={e => { if(e.key==='Enter'){if(pw===ADMIN_PASSWORD){onLogin();}else{setPwErr('Incorrect password');}}}} />
          {pwErr && <span className="error-msg">{pwErr}</span>}
        </div>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={() => { if(pw===ADMIN_PASSWORD){onLogin();}else{setPwErr('Incorrect password');}}}>
          Sign In
        </button>
      </div>
    );
  }

  return (
    <div>
      <div className="tabs">
        {['controls','entries','tiebreakers'].map(t => (
          <button key={t} className={`tab ${adminTab===t?'active':''}`} onClick={() => setAdminTab(t)}>
            {t.charAt(0).toUpperCase() + t.slice(1)}
          </button>
        ))}
      </div>

      {adminTab === 'controls' && (
        <div className="card">
          <div className="card-header"><h2>Pool Controls</h2></div>
          <div className="card-body">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'20px'}}>
              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'12px',color:'var(--green)'}}>Data Source</h3>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',marginBottom:'8px'}}>
                  <input type="radio" checked={useMockData} onChange={() => setUseMockData(true)} style={{accentColor:'var(--green)'}} />
                  <div>
                    <div style={{fontSize:'13px',fontWeight:'500'}}>Demo / Mock Data</div>
                    <div style={{fontSize:'11px',color:'var(--text-muted)'}}>Use for testing before tournament</div>
                  </div>
                </label>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'}}>
                  <input type="radio" checked={!useMockData} onChange={() => setUseMockData(false)} style={{accentColor:'var(--green)'}} />
                  <div>
                    <div style={{fontSize:'13px',fontWeight:'500'}}>Live ESPN Data</div>
                    <div style={{fontSize:'11px',color:'var(--text-muted)'}}>Pull real scores every 5 min</div>
                  </div>
                </label>
                <button className="btn btn-outline" style={{marginTop:'12px',width:'100%',fontSize:'13px'}} onClick={onRefresh}>
                  Force Refresh Now
                </button>
              </div>

              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'12px',color:'var(--green)'}}>Cut Line</h3>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',marginBottom:'12px'}}>
                  <input type="checkbox" checked={isCutMade} onChange={e => setIsCutMade(e.target.checked)} style={{accentColor:'var(--green)',width:'15px',height:'15px'}} />
                  <span style={{fontSize:'13px',fontWeight:'500'}}>Cut has been made (activate Friday)</span>
                </label>
                {isCutMade && (
                  <div className="form-field">
                    <label>Cut Line Score</label>
                    <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                      <input type="number" value={cutInput} onChange={e => setCutInput(e.target.value)} style={{width:'80px'}} />
                      <button className="btn btn-outline" style={{fontSize:'12px',padding:'8px 12px'}} onClick={() => setCutLine(parseInt(cutInput))}>Apply</button>
                    </div>
                    <small style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'3px'}}>Current cut line: {formatScore(cutLine)}</small>
                  </div>
                )}
              </div>
            </div>

            <div style={{marginTop:'20px',background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
              <h3 style={{fontSize:'15px',marginBottom:'8px',color:'var(--green)'}}>Pool Summary</h3>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'12px'}}>
                {[
                  { label: 'Total Entries', value: entries.length },
                  { label: 'Leader', value: standings[0]?.participant_name?.split(' ')[0] || '—' },
                  { label: 'Leading Score', value: standings[0] ? formatScore(standings[0].totalScore) : '—' },
                  { label: 'Cut Made', value: isCutMade ? 'Yes' : 'No' }
                ].map(s => (
                  <div key={s.label} style={{background:'white',borderRadius:'8px',padding:'12px',textAlign:'center'}}>
                    <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.6px'}}>{s.label}</div>
                    <div style={{fontSize:'18px',fontWeight:'500',color:'var(--green)'}}>{s.value}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {adminTab === 'entries' && (
        <div className="card">
          <div className="card-header">
            <h2>All Entries ({entries.length})</h2>
          </div>
          <div style={{overflowX:'auto'}}>
            <table className="admin-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>G1</th><th>G2</th><th>G3</th><th>G4</th><th>G5</th><th>G6</th>
                  <th>TB Amateur</th>
                  <th>TB Birdies</th>
                  <th>Score</th>
                  <th>Submitted</th>
                </tr>
              </thead>
              <tbody>
                {entries.map((e, i) => {
                  const standing = standings.find(s => s.id === e.id);
                  return (
                    <tr key={e.id}>
                      <td style={{color:'var(--text-muted)'}}>{i+1}</td>
                      <td style={{fontWeight:'500'}}>{e.participant_name}</td>
                      <td style={{color:'var(--text-muted)'}}>{e.email || '—'}</td>
                      <td>{e.group1_pick?.split(' ').slice(-1)[0]}</td>
                      <td>{e.group2_pick?.split(' ').slice(-1)[0]}</td>
                      <td>{e.group3_pick?.split(' ').slice(-1)[0]}</td>
                      <td>{e.group4_pick?.split(' ').slice(-1)[0]}</td>
                      <td>{e.group5_pick?.split(' ').slice(-1)[0]}</td>
                      <td>{e.group6_pick?.split(' ').slice(-1)[0]}</td>
                      <td>{e.tiebreaker_amateur?.split(' ').slice(-1)[0]}</td>
                      <td>{e.tiebreaker_birdies}</td>
                      <td><span className={`score-val ${scoreClass(standing?.totalScore)}`} style={{fontWeight:'600'}}>{standing ? formatScore(standing.totalScore) : '—'}</span></td>
                      <td style={{color:'var(--text-muted)'}}>{new Date(e.created_at).toLocaleDateString()}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {adminTab === 'tiebreakers' && (
        <div className="card">
          <div className="card-header"><h2>Tiebreaker Resolution</h2></div>
          <div className="card-body">
            <div style={{maxWidth:'600px'}}>
              <div className="form-field" style={{marginBottom:'20px'}}>
                <label>Actual Final Round Birdie Count (T10 and above)</label>
                <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                  <input type="number" value={actualBirdieCount} onChange={e => setActualBirdieCount(e.target.value)} placeholder="Enter actual count" style={{width:'140px'}} />
                </div>
                <small style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'3px'}}>Enter this after the final round to see who was closest</small>
              </div>

              <div className="tiebreaker-panel">
                <h4>Birdie Tiebreaker — All Entries</h4>
                {entries.length === 0 ? (
                  <p style={{fontSize:'13px',color:'var(--text-muted)'}}>No entries yet.</p>
                ) : (
                  [...entries]
                    .sort((a,b) => {
                      if (!actualBirdieCount) return 0;
                      return Math.abs(a.tiebreaker_birdies - parseInt(actualBirdieCount)) - Math.abs(b.tiebreaker_birdies - parseInt(actualBirdieCount));
                    })
                    .map(e => {
                      const diff = actualBirdieCount ? Math.abs(e.tiebreaker_birdies - parseInt(actualBirdieCount)) : null;
                      return (
                        <div key={e.id} className="tiebreaker-row">
                          <span className="tb-name">{e.participant_name}</span>
                          <span className="tb-guess">Guessed: {e.tiebreaker_birdies}</span>
                          {actualBirdieCount && <span className="tb-actual">Actual: {actualBirdieCount} (off by {diff})</span>}
                          <span className="tb-guess">Amat: {e.tiebreaker_amateur?.split(' ').slice(-1)[0]}</span>
                        </div>
                      );
                    })
                )}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
