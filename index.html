  if (ms<=0) return null;
  const d=Math.floor(ms/86400000), h=Math.floor((ms%86400000)/3600000), m=Math.floor((ms%3600000)/60000);
  if (d>0) return `${d}d ${h}h ${m}m`;
  if (h>0) return `${h}h ${m}m`;
  return `${m}m`;
}
async function fetchESPN() {
  try {
    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?event=401811938');
    const data = await res.json();
    const competitors = data?.events?.[0]?.competitions?.[0]?.competitors||[];
    const scores = {};
    competitors.forEach(c=>{
      const name=c.athlete?.displayName;
      if (!name) return;
      // Try toPar first (relative to par, e.g. -11), then fall back to score display
      let toPar = c.statistics?.find(s=>s.name==='toPar')?.displayValue
                ?? c.statistics?.find(s=>s.name==='scoreToPar')?.displayValue
                ?? c.status?.displayValue;
      // Also check top-level score fields
      const scoreDisp = c.score?.displayValue;
      // Parse whichever gives us a relative-to-par number
      let parsed = null;
      for (const raw of [toPar, scoreDisp]) {
        if (raw === undefined || raw === null) continue;
        const s = String(raw).trim();
        if (s === 'E' || s === 'EVEN') { parsed = 0; break; }
        if (s === 'CUT' || s === 'WD' || s === 'DQ') { parsed = 'CUT'; break; }
        const n = parseInt(s);
        // Only accept if it looks like a reasonable to-par score (-30 to +30)
        if (!isNaN(n) && n >= -30 && n <= 30) { parsed = n; break; }
      }
      if (parsed !== null) scores[name] = parsed;
    });
    return Object.keys(scores).length>0?scores:null;
  } catch(e) { return null; }
}
function computeStandings(entries, scores, field, cutLine, isCutMade) {
  return entries.map(entry=>{
    const picks=[entry.group1_pick,entry.group2_pick,entry.group3_pick,entry.group4_pick,entry.group5_pick,entry.group6_pick];
    const pickScores=picks.map(name=>{
      const info=field.find(p=>p.name===name);
      let score=scores[name];
      if (score==='WD'||(score===null&&info?.wd)) return {name,score:isCutMade?10:cutLine+5,status:'wd'};
      if (score===null||score===undefined) score=0;
      if (isCutMade&&score>cutLine) return {name,score:cutLine,status:'cut'};
      return {name,score,status:'active'};
    });
    pickScores.sort((a,b)=>a.score-b.score);
    const dropped=pickScores[pickScores.length-1];
    const counted=pickScores.slice(0,5);
    const total=counted.reduce((s,p)=>s+p.score,0);
    return {...entry,pickScores,droppedPick:dropped,countedPicks:counted,totalScore:total};
  }).sort((a,b)=>a.totalScore-b.totalScore);
}

function StandingsView({standings,entries,picksRevealed,entriesClosed}) {

    </div></div>

  const picksLocked=entriesClosed&&!picksRevealed;
  if (picksLocked) return (
    <div className="card">
      <div className="card-header">

  const inMoney=Math.min(5,standings.length);
  const cutoffScore=standings.slice(0,inMoney).map(s=>s.totalScore).slice(-1)[0];
  const tiedAtCutoff=standings.filter(s=>s.totalScore===cutoffScore).length>1;
  return (
    <div className="card">

        <div style={{display:'flex',gap:'16px',fontSize:'12px',color:'var(--text-muted)',flexWrap:'wrap'}}>

        </div>
      </div>
      <div style={{overflowX:'auto'}}>
        <table className="standings-table">
          <thead><tr><th style={{width:'48px'}}>Pos</th><th>Participant</th><th style={{width:'70px',textAlign:'center'}}>Total</th><th>Picks · worst dropped</th><th style={{width:'90px'}}>Tiebreakers</th></tr></thead>
          <tbody>
            {standings.map((entry,i)=>{
              const isIM=i<inMoney;
              const isTied=isIM&&tiedAtCutoff&&entry.totalScore===cutoffScore;
              return (
                <tr key={entry.id} className={isTied?'in-money-tied':isIM?'in-money':''}>
                  <td><div className="rank-badge" style={i===0?{background:'var(--gold)',color:'white'}:i===1?{background:'#c0c0c0',color:'white'}:i===2?{background:'#cd7f32',color:'white'}:{}}>{isTied?'T':''}{i+1}</div></td>
                  <td>

                    {isIM&&<div style={{fontSize:'10px',color:'var(--gold)',marginTop:'2px'}}>● In the money</div>}
                    {isTied&&<div style={{fontSize:'10px',color:'var(--text-muted)',marginTop:'2px'}}>Tied — tiebreakers apply</div>}
                  </td>
                  <td style={{textAlign:'center'}}><span className={`score-val ${sc(entry.totalScore)}`} style={{fontSize:'16px',fontWeight:'600'}}>{fmt(entry.totalScore)}</span></td>
                  <td><div className="picks-row">{entry.pickScores.map((p,pi)=>{
                    const isD=p.name===entry.droppedPick?.name;
                    return <span key={pi} className={`pick-chip ${isD?'worst':p.status==='wd'?'wd':p.status==='cut'?'cut':''}`} title={p.status==='wd'?'Withdrawn':p.status==='cut'?'Missed Cut':''}>{p.name.split(' ').slice(-1)[0]} {fmt(p.score)}</span>;
                  })}</div></td>

                    <div>Amat: {entry.tiebreaker_amateur?.split(' ').slice(-1)[0]||'—'}</div>

            })}

        </table>
      </div>
    </div>
  );
}

function LeaderboardView({scores,field,useMock}) {
  const [active,setActive]=useState('all');
  let withScores;
  if (useMock) {
    const playerList=field.length>0?field:MOCK_FIELD;
    withScores=playerList.map(p=>({name:p.name||p.player_name,score:scores[p.name]??scores[p.player_name]??null,group:p.group_number||p.group,owgr:p.owgr,is_amateur:p.is_amateur})).filter(p=>p.score!==null);
  } else {
    withScores=Object.entries(scores).map(([name,score])=>{
      const fp=field.find(p=>(p.name||p.player_name)===name);
      return {name,score,group:fp?.group_number||fp?.group||null,owgr:fp?.owgr||null,is_amateur:fp?.is_amateur||false};
    }).filter(p=>p.score!==null&&p.score!==undefined);
  }
  withScores.sort((a,b)=>a.score-b.score);
  const filtered=active==='all'?withScores:withScores.filter(p=>p.group===parseInt(active));
  let pos=1;
  const withPos=filtered.map((p,i)=>{
    if (i>0&&filtered[i-1].score===p.score) return {...p,pos:filtered[i-1].pos,tied:true};
    const r={...p,pos,tied:false}; pos=i+2; return r;
  });
  return (
    <div className="card">
      <div className="card-header"><h2>Tournament Leaderboard</h2><div style={{fontSize:'12px',color:'var(--text-muted)'}}>{withScores.length} players</div></div>
      <div style={{padding:'16px 24px 0'}}><div className="tabs">
        {['all',1,2,3,4,5,6].map(g=><button key={g} className={`tab ${active==g?'active':''}`} onClick={()=>setActive(String(g))}>{g==='all'?'All Players':`Group ${g}`}</button>)}
      </div></div>
      <div style={{overflowX:'auto'}}>
        <table className="leaderboard-table">
          <thead><tr><th style={{width:'50px'}}>Pos</th><th>Player</th><th style={{width:'70px',textAlign:'center'}}>Score</th><th style={{width:'60px',textAlign:'center'}}>Group</th><th style={{width:'60px',textAlign:'center'}}>OWGR</th></tr></thead>
          <tbody>{withPos.map((p,i)=>(
            <tr key={i}>
              <td><span style={{fontWeight:'500',fontSize:'12px'}}>{p.tied?`T${p.pos}`:p.pos}</span></td>
              <td><span style={{fontWeight:'500'}}>{p.name}</span>{p.is_amateur&&<span className="amateur-badge" style={{marginLeft:'6px'}}>Am</span>}</td>
              <td style={{textAlign:'center'}}><span className={`score-val ${sc(p.score)}`} style={{fontWeight:'600'}}>{fmt(p.score)}</span></td>
              <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:'12px'}}>{p.group?`G${p.group}`:'—'}</td>
              <td style={{textAlign:'center',color:'var(--text-muted)',fontSize:'12px'}}>{p.owgr||'—'}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

                </div>
              </div>
              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px',marginBottom:'20px',border:'2px solid var(--gold)'}}>
                <div style={{fontSize:'15px',fontWeight:'500',color:'var(--green)',marginBottom:'8px',fontFamily:"'Playfair Display',serif"}}>💸 One last thing...</div>
                <p style={{fontSize:'13px',color:'var(--text-muted)',marginBottom:'14px'}}>Have you paid your entry fee via Venmo yet? Unpaid entries will be disqualified.</p>
                <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
                  <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',padding:'10px 16px',borderRadius:'8px',border:`2px solid ${form.venmo_paid==='yes'?'var(--green)':'var(--border)'}`,background:form.venmo_paid==='yes'?'rgba(26,71,42,0.06)':'white',flex:1,minWidth:'120px'}}>
                    <input type="radio" name="venmo" value="yes" checked={form.venmo_paid==='yes'} onChange={()=>set('venmo_paid','yes')} style={{accentColor:'var(--green)'}} />
                    <span style={{fontSize:'14px',fontWeight:'500',color:'var(--green)'}}>✓ Yes, paid!</span>
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',padding:'10px 16px',borderRadius:'8px',border:`2px solid ${form.venmo_paid==='no'?'var(--red)':'var(--border)'}`,background:form.venmo_paid==='no'?'rgba(192,57,43,0.04)':'white',flex:1,minWidth:'120px'}}>
                    <input type="radio" name="venmo" value="no" checked={form.venmo_paid==='no'} onChange={()=>set('venmo_paid','no')} style={{accentColor:'var(--red)'}} />
                    <span style={{fontSize:'14px',color:'var(--text-muted)'}}>Not yet</span>
                  </label>
                </div>
                {form.venmo_paid==='no'&&<div style={{marginTop:'10px',fontSize:'12px',color:'var(--red)',padding:'8px 12px',background:'rgba(192,57,43,0.06)',borderRadius:'6px'}}>Please Venmo your entry fee before submitting — unpaid entries will be removed.</div>}
                {errors.venmo_paid&&<div className="error-msg" style={{marginTop:'6px'}}>{errors.venmo_paid}</div>}
              </div>
              <div className="alert alert-warning" style={{marginBottom:'20px'}}><strong>Your picks:</strong> {[1,2,3,4,5,6].map(g=>form[`group${g}_pick`]||`G${g}: none`).join(' · ')}</div>
              {errors.submit&&<div style={{color:'var(--red)',fontSize:'13px',marginBottom:'12px'}}>{errors.submit}</div>}
              <div style={{display:'flex',gap:'12px'}}>
                <button className="btn btn-outline" onClick={()=>setStep(2)}>← Back</button>
                <button className="btn btn-gold" onClick={submit} disabled={submitting}>
                  {submitting?<div style={{display:'flex',alignItems:'center',gap:'8px'}}><div className="spinner"></div>Submitting...</div>:'🏆 Submit Entry'}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function EditModal({entry,groupedField,onSave,onClose}) {
  const [form,setForm]=useState({group1_pick:entry.group1_pick,group2_pick:entry.group2_pick,group3_pick:entry.group3_pick,group4_pick:entry.group4_pick,group5_pick:entry.group5_pick,group6_pick:entry.group6_pick,tiebreaker_amateur:entry.tiebreaker_amateur,tiebreaker_birdies:entry.tiebreaker_birdies});
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const save=async()=>{ setSaving(true); const ok=await supabase.update('entries',entry.id,form); if(ok){setSaved(true);setTimeout(()=>{onSave();onClose();},700);} setSaving(false); };
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')onClose();}}>
      <div className="modal">
        <h3>Edit Entry</h3>
        <div className="modal-sub">Editing picks for <strong>{entry.participant_name}</strong></div>
        <div className="edit-grid">
          {[1,2,3,4,5,6].map(g=>(
            <div key={g} className="edit-group">
              <label>Group {g}{g<6?` (OWGR ${(g-1)*10+1}–${g*10})`:' (Field + Amateurs)'}</label>
              <select value={form[`group${g}_pick`]} onChange={e=>set(`group${g}_pick`,e.target.value)}>
                {(groupedField.find(gf=>gf.group===g)?.players||[]).map(p=>{const n=p.name||p.player_name;return <option key={n} value={n}>{n}{p.is_amateur?' (Am)':''}</option>;})}
              </select>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'4px'}}>
          <div className="edit-group">
            <label>TB1 — Low Amateur</label>
            <select value={form.tiebreaker_amateur} onChange={e=>set('tiebreaker_amateur',e.target.value)}>
              {(groupedField.find(g=>g.group===6)?.players||[]).filter(p=>p.is_amateur).map(p=>{const n=p.name||p.player_name;return <option key={n} value={n}>{n}</option>;})}
            </select>
          </div>
          <div className="edit-group">
            <label>TB2 — Birdie Guess</label>
            <input type="number" value={form.tiebreaker_birdies} onChange={e=>set('tiebreaker_birdies',parseInt(e.target.value))} />
          </div>
        </div>
        <div style={{display:'flex',gap:'10px',marginTop:'20px',justifyContent:'flex-end'}}>
          <button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary btn-sm" onClick={save} disabled={saving||saved}>{saved?'✓ Saved!':saving?'Saving...':'Save Changes'}</button>
        </div>
      </div>
    </div>
  );
}

function AdminView({loggedIn,onLogin,entries,standings,scores,field,useMock,setUseMock,cutLine,setCutLine,isCutMade,setIsCutMade,birdieCount,setBirdieCount,picksRevealed,setPicksRevealed,onRefresh,onEntriesChange,groupedField}) {
  const [pw,setPw]=useState('');
  const [pwErr,setPwErr]=useState('');
  const [tab,setTab]=useState('controls');
  const [cutInput,setCutInput]=useState(cutLine);
  const [editing,setEditing]=useState(null);
  const [confirmDelete,setConfirmDelete]=useState(null);

  const handleDelete = async (entry) => {
    const ok = await supabase.delete('entries', entry.id);
    if (ok) { onEntriesChange(); setConfirmDelete(null); }
  };

  if (!loggedIn) return (
    <div className="login-box">
      <div style={{fontSize:'32px',marginBottom:'12px'}}>🔒</div>
      <h2>Admin Access</h2>
      <p>Enter your admin password to manage the pool.</p>
      <div className="form-field" style={{marginBottom:'12px'}}>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" onKeyDown={e=>{if(e.key==='Enter'){if(pw===ADMIN_PASSWORD)onLogin();else setPwErr('Incorrect password');}}} />
        {pwErr&&<span className="error-msg">{pwErr}</span>}
      </div>
      <button className="btn btn-primary" style={{width:'100%'}} onClick={()=>{if(pw===ADMIN_PASSWORD)onLogin();else setPwErr('Incorrect password');}}>Sign In</button>
    </div>
  );

  return (
    <div>
      {editing&&<EditModal entry={editing} groupedField={groupedField} onSave={onEntriesChange} onClose={()=>setEditing(null)}/>}
      {confirmDelete&&(
        <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')setConfirmDelete(null);}}>
          <div className="modal" style={{maxWidth:'420px',textAlign:'center'}}>
            <div style={{fontSize:'32px',marginBottom:'12px'}}>🗑️</div>
            <h3 style={{marginBottom:'6px'}}>Delete Entry?</h3>
            <div className="modal-sub">This will permanently remove <strong>{confirmDelete.participant_name}</strong>'s entry. This cannot be undone.</div>
            <div style={{display:'flex',gap:'10px',justifyContent:'center',marginTop:'20px'}}>
              <button className="btn btn-outline btn-sm" onClick={()=>setConfirmDelete(null)}>Cancel</button>
              <button className="btn btn-sm" style={{background:'var(--red)',color:'white',border:'none'}} onClick={()=>handleDelete(confirmDelete)}>Yes, Delete</button>
            </div>
          </div>
        </div>
      )}
      <div className="tabs">
        {['controls','entries','tiebreakers'].map(t=><button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
      </div>

      {tab==='controls'&&(
        <div className="card">
          <div className="card-header"><h2>Pool Controls</h2></div>
          <div className="card-body">
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'20px'}}>
              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'12px',color:'var(--green)'}}>Data Source</h3>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',marginBottom:'8px'}}>
                  <input type="radio" checked={useMock} onChange={()=>setUseMock(true)} style={{accentColor:'var(--green)'}} />
                  <div><div style={{fontSize:'13px',fontWeight:'500'}}>Demo / Mock Data</div><div style={{fontSize:'11px',color:'var(--text-muted)'}}>For testing before tournament</div></div>
                </label>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'}}>
                  <input type="radio" checked={!useMock} onChange={()=>setUseMock(false)} style={{accentColor:'var(--green)'}} />
                  <div><div style={{fontSize:'13px',fontWeight:'500'}}>Live ESPN Data</div><div style={{fontSize:'11px',color:'var(--text-muted)'}}>Real scores every 5 min</div></div>
                </label>
                <button className="btn btn-outline" style={{marginTop:'12px',width:'100%',fontSize:'13px'}} onClick={onRefresh}>Force Refresh</button>
              </div>
              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'10px',color:'var(--green)'}}>Picks Visibility</h3>
                <p style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'12px'}}>After the April 9th deadline, picks are hidden until you reveal them here.</p>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',marginBottom:'10px'}}>
                  <input type="checkbox" checked={picksRevealed} onChange={e=>setPicksRevealed(e.target.checked)} style={{accentColor:'var(--green)',width:'15px',height:'15px'}} />
                  <div><div style={{fontSize:'13px',fontWeight:'500'}}>Reveal all picks publicly</div><div style={{fontSize:'11px',color:'var(--text-muted)'}}>Flip on when tournament starts Thursday</div></div>
                </label>
                <div style={{fontSize:'12px',padding:'8px 12px',borderRadius:'6px',background:picksRevealed?'rgba(26,71,42,0.08)':'rgba(192,57,43,0.08)',color:picksRevealed?'var(--green)':'var(--red)'}}>
                  {picksRevealed?'✓ Picks visible to everyone':'🔒 Picks hidden from participants'}
                </div>
              </div>
              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'12px',color:'var(--green)'}}>Cut Line</h3>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',marginBottom:'12px'}}>
                  <input type="checkbox" checked={isCutMade} onChange={e=>setIsCutMade(e.target.checked)} style={{accentColor:'var(--green)',width:'15px',height:'15px'}} />
                  <span style={{fontSize:'13px',fontWeight:'500'}}>Cut has been made (activate Friday)</span>
                </label>
                {isCutMade&&(
                  <div className="form-field">
                    <label>Cut Line Score</label>
                    <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                      <input type="number" value={cutInput} onChange={e=>setCutInput(e.target.value)} style={{width:'80px'}} />
                      <button className="btn btn-outline btn-sm" onClick={()=>setCutLine(parseInt(cutInput))}>Apply</button>
                    </div>
                    <small style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'3px'}}>Current: {fmt(cutLine)}</small>
                  </div>
                )}
              </div>
            </div>
            <div style={{marginTop:'20px',background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
              <h3 style={{fontSize:'15px',marginBottom:'10px',color:'var(--green)'}}>Pool Summary</h3>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:'12px'}}>
                {[{l:'Entries',v:entries.length},{l:'Leader',v:standings[0]?.participant_name?.split(' ')[0]||'—'},{l:'Top Score',v:standings[0]?fmt(standings[0].totalScore):'—'},{l:'Picks Shown',v:picksRevealed?'Yes':'No'},{l:'Cut Made',v:isCutMade?'Yes':'No'}].map(s=>(
                  <div key={s.l} style={{background:'white',borderRadius:'8px',padding:'12px',textAlign:'center'}}>
                    <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.6px'}}>{s.l}</div>
                    <div style={{fontSize:'18px',fontWeight:'500',color:'var(--green)'}}>{s.v}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {tab==='entries'&&(
        <div className="card">
          <div className="card-header">
            <h2>All Entries ({entries.length})</h2>
            <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Click Edit to change picks before the tournament starts</div>
          </div>
          <div style={{overflowX:'auto'}}>
            <table className="admin-table">
              <thead><tr><th>#</th><th>Name</th><th>G1</th><th>G2</th><th>G3</th><th>G4</th><th>G5</th><th>G6</th><th>TB Amat</th><th>TB Birds</th><th>Score</th><th>Date</th><th></th></tr></thead>
              <tbody>{entries.map((e,i)=>{
                const s=standings.find(x=>x.id===e.id);
                return (
                  <tr key={e.id}>
                    <td style={{color:'var(--text-muted)'}}>{i+1}</td>
                    <td style={{fontWeight:'500'}}>{e.participant_name}</td>
                    <td>{e.group1_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group2_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group3_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group4_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group5_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group6_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.tiebreaker_amateur?.split(' ').slice(-1)[0]}</td>
                    <td>{e.tiebreaker_birdies}</td>
                    <td><span className={`score-val ${sc(s?.totalScore)}`} style={{fontWeight:'600'}}>{s?fmt(s.totalScore):'—'}</span></td>
                    <td style={{color:'var(--text-muted)'}}>{new Date(e.created_at).toLocaleDateString()}</td>
                    <td style={{display:'flex',gap:'6px'}}>
                      <button className="btn btn-outline btn-sm" onClick={()=>setEditing(e)}>Edit</button>
                      <button className="btn btn-sm" style={{background:'transparent',border:'1px solid var(--red)',color:'var(--red)'}} onClick={()=>setConfirmDelete(e)}>Delete</button>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      {tab==='tiebreakers'&&(
        <div className="card">
          <div className="card-header"><h2>Tiebreaker Resolution</h2></div>
          <div className="card-body">
            <div style={{maxWidth:'600px'}}>
              <div className="form-field" style={{marginBottom:'20px'}}>
                <label>Actual Final Round Birdie Count (T10 and above)</label>
                <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                  <input type="number" value={birdieCount} onChange={e=>setBirdieCount(e.target.value)} placeholder="Enter actual count" style={{width:'140px'}} />
                </div>
                <small style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'3px'}}>Enter after the final round to see who was closest</small>
              </div>
              <div className="tiebreaker-panel">
                <h4>Birdie Tiebreaker — All Entries</h4>
                {entries.length===0?<p style={{fontSize:'13px',color:'var(--text-muted)'}}>No entries yet.</p>:(
                  [...entries].sort((a,b)=>{
                    if(!birdieCount)return 0;
                    return Math.abs(a.tiebreaker_birdies-parseInt(birdieCount))-Math.abs(b.tiebreaker_birdies-parseInt(birdieCount));
                  }).map(e=>{
                    const diff=birdieCount?Math.abs(e.tiebreaker_birdies-parseInt(birdieCount)):null;
                    return (
                      <div key={e.id} className="tiebreaker-row">
                        <span style={{fontWeight:'500',minWidth:'140px'}}>{e.participant_name}</span>
                        <span style={{color:'var(--text-muted)',fontSize:'12px'}}>Guessed <strong style={{color:'var(--text)'}}>{e.tiebreaker_birdies}</strong></span>
                        {birdieCount&&<span style={{color:'var(--green-light)',fontSize:'12px',fontWeight:'500'}}>Off by {diff}</span>}
                        <span style={{color:'var(--text-muted)',fontSize:'12px'}}>Amateur: {e.tiebreaker_amateur?.split(' ').slice(-1)[0]}</span>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
