const supabase = {
  async query(table, options={}) {
    let url = `${SUPABASE_URL}/rest/v1/${table}?`;
    if (options.select) url += `select=${options.select}&`;
    if (options.order) url += `order=${options.order}&`;
    const res = await fetch(url, { headers: {'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'} });
    return res.json();
  },
  async insert(table, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:'POST',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(data)
    });
    return res.ok;
  },
  async update(table, id, data) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'PATCH',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(data)
    });
    return res.ok;
  },
  async delete(table, id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:'DELETE',
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json'}
    });
    return res.ok;
  }
};

function fmt(s) {
  if (s===null||s===undefined) return 'N/A';
  if (s===0) return 'E';
  return s>0?`+${s}`:`${s}`;
}
function sc(s) {
  if (s===null||s===undefined) return 'even';
  return s<0?'under':s>0?'over':'even';
}
function countdown(ms) {
  if (ms<=0) return null;
  const d=Math.floor(ms/86400000), h=Math.floor((ms%86400000)/3600000), m=Math.floor((ms%3600000)/60000);
  if (d>0) return `${d}d ${h}h ${m}m`;
  if (h>0) return `${h}h ${m}m`;
  return `${m}m`;
}

function formatTeeTime(raw) {
  if (!raw) return '—';
  try {
    const d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true, timeZone:'America/New_York'});
  } catch(e) { return raw; }
}

function findDetailsByLastName(details, name) {
  const last = name.split(' ').slice(-1)[0].toLowerCase();
  const matches = Object.keys(details).filter(k => k.split(' ').slice(-1)[0].toLowerCase() === last);
  // Only use last name fallback if exactly one player has that last name
  if (matches.length === 1) return details[matches[0]];
  return null;
}

// Normalize ESPN name to our field name
function normalizeESPNName(name) {
  return ESPN_NAME_MAP[name] || name;
}

// Fuzzy name lookup — handles ESPN name variations like accents, spacing
function findScore(scores, name) {
  if (scores[name] !== undefined) return scores[name];
  // Only use last name fallback if exactly one player has that last name
  const last = name.split(' ').slice(-1)[0].toLowerCase();
  const matches = Object.keys(scores).filter(k => k.split(' ').slice(-1)[0].toLowerCase() === last);
  if (matches.length === 1) return scores[matches[0]];
  return null;
}

async function fetchESPN() {
  try {
    const res = await fetch('https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?event=401811941');
    const data = await res.json();
    const competitors = data?.events?.[0]?.competitions?.[0]?.competitors||[];
    const tourneyStatus = data?.events?.[0]?.status?.type?.name || 'scheduled';
    const scores = {};
    const playerDetails = {};
    const espnField = []; // full field from ESPN

    competitors.forEach(c=>{
      const rawName = c.athlete?.displayName;
      if (!rawName) return;
      const name = normalizeESPNName(rawName);

      const statusName = c.status?.type?.name || 'scheduled';
      const teeTime = c.status?.teeTime || c.teeTime || null;

      // thru is in c.status.hole, fall back to statistics
      const thruRaw = c.status?.hole ?? c.status?.thru ??
        c.statistics?.find(s=>s.name==='thru'||s.name==='holesPlayed'||s.name==='holesCompleted')?.displayValue ?? null;
      const thru = thruRaw !== null ? String(thruRaw).replace('*','').trim() : null;
      const round = c.statistics?.find(s=>s.name==='round')?.displayValue ?? null;

      // Parse toPar score
      let toPar = c.statistics?.find(s=>s.name==='toPar')?.displayValue
                ?? c.statistics?.find(s=>s.name==='scoreToPar')?.displayValue;
      const scoreDisp = c.score?.displayValue;
      let parsed = null;
      for (const raw of [toPar, scoreDisp]) {
        if (raw === undefined || raw === null) continue;
        const s = String(raw).trim();
        if (s === 'E' || s === 'EVEN') { parsed = 0; break; }
        if (s === 'CUT' || s === 'WD' || s === 'DQ') { parsed = 'CUT'; break; }
        const n = parseInt(s);
        if (!isNaN(n) && n >= -30 && n <= 30) { parsed = n; break; }
      }

      playerDetails[name] = {
        status: statusName,
        teeTime,
        thru: thru || null,
        round,
        score: parsed
      };

      if (parsed !== null) scores[name] = parsed;

      // Build full field entry — sort order from ESPN (by position)
      espnField.push({
        name,
        sortOrder: c.sortOrder ?? 999,
        is_amateur: c.amateur ?? false
      });
    });

    return { scores, playerDetails, espnField };
  } catch(e) { return null; }
}

function computeStandings(entries, scores, field, cutLine, isCutMade) {
  return entries.map(entry=>{
    const picks=[entry.group1_pick,entry.group2_pick,entry.group3_pick,entry.group4_pick,entry.group5_pick,entry.group6_pick];
    const pickScores=picks.map(name=>{
      const info=field.find(p=>p.name===name);
      let score=findScore(scores,name);
      if (score==='WD'||(score===null&&info?.wd)) return {name,score:isCutMade?10:cutLine+5,status:'wd'};
      if (score===null||score===undefined) score=0;
      if (isCutMade&&score>cutLine) return {name,score:cutLine,status:'cut'};
      return {name,score,status:'active'};
    });
    pickScores.sort((a,b)=>a.score-b.score);
    const dropped=pickScores[pickScores.length-1];
    const counted=pickScores.slice(0,5);
    const total=counted.reduce((s,p)=>s+p.score,0);
    return {...entry,pickScores,droppedPick:dropped,countedPicks:counted,totalScore:total};
  }).sort((a,b)=>a.totalScore-b.totalScore);
}

      </div>
    </div>
  );
}

  const [search,setSearch]=useState('');

  const toggleStar=(id)=>{
    setStarred(prev=>{
      const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];

    const isTied=isIM&&tiedAtCutoff&&entry.totalScore===cutoffScore;
    const isStarred=starred.includes(entry.id);

        <td><div className="picks-row">{entry.pickScores.map((p,pi)=>{

          return <span key={pi} className={`pick-chip ${isD?'worst':p.status==='wd'?'wd':p.status==='cut'?'cut':''}`}>{p.name.split(' ').slice(-1)[0]} {fmt(p.score)}</span>;
        })}</div></td>

  return (

          <span style={{display:'flex',alignItems:'center',gap:'4px'}}><span style={{width:'10px',height:'10px',background:'rgba(192,57,43,0.2)',display:'inline-block',borderRadius:'2px'}}></span>Dropped</span>

      </div>
      {payouts&&Object.values(payouts).some(v=>v)&&(
        <div className="payout-banner">
          <span style={{fontSize:'12px',fontWeight:'500',color:'var(--text-muted)',marginRight:'4px',fontFamily:"'Inter',sans-serif"}}>💰 Payouts:</span>
          {[1,2,3,4,5].map(p=>payouts[p]?(
            <div key={p} className="payout-pill">
              <span className="payout-place">{p===1?'1st':p===2?'2nd':p===3?'3rd':`${p}th`}</span>
              <span className="payout-amount">${payouts[p]}</span>

          ):null)}

      )}
      <div className="standings-toolbar">
        <div className="standings-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-light)" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name..." />
          {search&&<button className="search-clear" onClick={()=>setSearch('')}>×</button>}
        </div>
        {starred.length>0&&!search&&<div style={{fontSize:'12px',color:'var(--text-muted)'}}>★ {starred.length} starred</div>}
      </div>
      {showStarred&&(
        <div className="starred-section">
          <div className="starred-label">★ Your entries</div>
          <div style={{overflowX:'auto'}}>
            <table className="standings-table">
              <tbody>{starredEntries.map(e=>renderRow(e))}</tbody>

        <table className="standings-table">

              ? <tr><td colSpan="6" style={{textAlign:'center',padding:'32px',color:'var(--text-muted)',fontSize:'13px'}}>No entries match "{search}"</td></tr>
              : filtered.map(e=>renderRow(e))
            }

        </table>
      </div>
    </div>
  );
}


function LeaderboardView({scores,field,espnDetails,tourneyStarted,espnField}) {
  const [active,setActive]=useState('all');
  let withScores;
  const playerList=field.length>0?field:MOCK_FIELD;

  const hasLiveScores=Object.keys(scores).length>0;

  // Build group lookup from defined field
  const fieldLookup = {};
  playerList.forEach(p=>{
    const n=p.name||p.player_name;
    fieldLookup[n]={group:p.group_number||p.group,owgr:p.owgr,is_amateur:p.is_amateur};
  });

  // Show all players — score from ESPN if available (E=0 before start), tee time from ESPN
  const fullField = espnField.length>0 ? espnField : playerList;
  withScores = playerList.map(p=>{
    const name = p.name||p.player_name;
    const group = p.group||p.group_number||null;
    const details = espnDetails[name]||findDetailsByLastName(espnDetails,name)||{};
    const score = hasLiveScores ? (findScore(scores,name)??0) : null;
    const teeTime = details.teeTime || null;  // Accept any tee time format from ESPN
    return {name, score, group, owgr:p.owgr||null, is_amateur:p.is_amateur||false,
      teeTime, thru:details.thru||null, status:details.status||'scheduled'};
  });
  if (hasLiveScores) {
    withScores.sort((a,b)=>{
      // Players with scores on course come first, sorted by score then thru
      const aStarted = a.thru !== null;
      const bStarted = b.thru !== null;
      if (aStarted && !bStarted) return -1;
      if (!aStarted && bStarted) return 1;
      if (a.score !== b.score) return a.score - b.score;
      // Same score — further along course ranks higher
      const aThru = a.thru==='F'?18:parseInt(a.thru)||0;
      const bThru = b.thru==='F'?18:parseInt(b.thru)||0;
      return bThru - aThru;
    });
  } else {
    withScores.sort((a,b)=>{
      if (!a.teeTime&&!b.teeTime) return (a.group||99)-(b.group||99);
      if (!a.teeTime) return 1;
      if (!b.teeTime) return -1;
      return a.teeTime.localeCompare(b.teeTime);
    });
  }
  const filtered=active==='all'?withScores:withScores.filter(p=>p.group===parseInt(active));
  let pos=1;
  const withPos=[];
  filtered.forEach((p,i)=>{
    if (i>0&&filtered[i-1].score===p.score) {
      withPos.push({...p,pos:withPos[i-1].pos,tied:true});
    } else {
      withPos.push({...p,pos,tied:false});
      pos=i+2;
    }
  });
  return (
    <div className="card">
      <div className="card-header"><h2>Tournament Leaderboard</h2><div style={{fontSize:'12px',color:'var(--text-muted)'}}>{withScores.length} players</div></div>
      <div style={{padding:'16px 24px 0'}}><div className="tabs">
        {['all',1,2,3,4,5,6].map(g=><button key={g} className={`tab ${active==g?'active':''}`} onClick={()=>setActive(String(g))}>{g==='all'?'All Players':`Group ${g}`}</button>)}
      </div></div>
      <div style={{overflowX:'auto'}}>
        <table className="leaderboard-table">
          <thead><tr><th style={{width:'50px'}}>Pos</th><th>Player</th><th style={{width:'70px',textAlign:'center'}}>Score</th><th style={{width:'70px',textAlign:'center'}}>Thru</th><th style={{width:'90px',textAlign:'center'}}>Tee Time</th><th style={{width:'60px',textAlign:'center'}}>Group</th></tr></thead>
          <tbody>{withPos.length===0?(
            <tr><td colSpan="6" style={{textAlign:'center',padding:'40px',color:'var(--text-muted)',fontSize:'13px'}}>
              Scores will appear here once the tournament begins Thursday April 10th.
            </td></tr>
          ):withPos.map((p,i)=>(
            <tr key={i}>
              <td><span style={{fontWeight:'500',fontSize:'12px'}}>{p.score===null?'':p.tied?`T${p.pos}`:p.pos}</span></td>
              <td><span style={{fontWeight:'500'}}>{p.name}</span>{p.is_amateur&&<span className="amateur-badge" style={{marginLeft:'6px'}}>Am</span>}</td>
              <td style={{textAlign:'center'}}>{p.score===null?<span style={{color:'var(--text-muted)'}}>—</span>:<span className={`score-val ${sc(p.score)}`} style={{fontWeight:'600'}}>{fmt(p.score)}</span>}</td>
              <td style={{textAlign:'center',fontSize:'12px',color:'var(--text-muted)'}}>{p.thru?(p.thru==='F'||p.thru==='18'?'F':p.thru):'—'}</td>
              <td style={{textAlign:'center',fontSize:'12px',color:'var(--text-muted)'}}>{formatTeeTime(p.teeTime)||'—'}</td>
              <td style={{textAlign:'center',fontSize:'12px',color:'var(--text-muted)'}}>{p.group?`G${p.group}`:'—'}</td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}


function EntryForm({groupedField,onSubmit,entriesClosed,timeLeft}) {

    </div></div>

  const v1=()=>{ const e={}; if(!form.participant_name.trim())e.participant_name='Name required'; if(!form.email.trim())e.email='Email is required'; else if(!/\S+@\S+\.\S+/.test(form.email))e.email='Invalid email'; setErrors(e); return !Object.keys(e).length; };
  const v2=()=>{ const e={}; for(let i=1;i<=6;i++) if(!form[`group${i}_pick`])e[`group${i}_pick`]='Select a player'; setErrors(e); return !Object.keys(e).length; };
  const v3=()=>{ const e={}; if(!form.tiebreaker_amateur)e.tiebreaker_amateur='Select an amateur'; if(!form.tiebreaker_birdies||isNaN(parseInt(form.tiebreaker_birdies)))e.tiebreaker_birdies='Enter a number'; if(form.venmo_paid!=='yes')e.venmo_paid='You must confirm payment before submitting'; setErrors(e); return !Object.keys(e).length; };
  const next=()=>{ if(step===1&&v1())setStep(2); if(step===2&&v2())setStep(3); };

                <p style={{fontSize:'13px',color:'var(--text-muted)',marginBottom:'14px'}}>Entry fee is <strong>$50</strong> <span style={{fontSize:'11px',color:'var(--text-muted)'}}>($3 covers platform costs)</span>. Have you paid via Venmo to <a href='https://venmo.com/u/jacob-martin-9' target='_blank' style={{color:'var(--green)',fontWeight:'600'}}>@jacob-martin-9</a>? Unpaid entries will be disqualified.</p>
                <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
                  <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',padding:'10px 16px',borderRadius:'8px',border:`2px solid ${form.venmo_paid==='yes'?'var(--green)':'var(--border)'}`,background:form.venmo_paid==='yes'?'rgba(26,71,42,0.06)':'white',flex:1,minWidth:'120px'}}>
                    <input type="radio" name="venmo" value="yes" checked={form.venmo_paid==='yes'} onChange={()=>set('venmo_paid','yes')} style={{accentColor:'var(--green)'}} />
                    <span style={{fontSize:'14px',fontWeight:'500',color:'var(--green)'}}>✓ Yes, paid!</span>
                  </label>
                  <label style={{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',padding:'10px 16px',borderRadius:'8px',border:`2px solid ${form.venmo_paid==='no'?'var(--red)':'var(--border)'}`,background:form.venmo_paid==='no'?'rgba(192,57,43,0.04)':'white',flex:1,minWidth:'120px'}}>
                    <input type="radio" name="venmo" value="no" checked={form.venmo_paid==='no'} onChange={()=>set('venmo_paid','no')} style={{accentColor:'var(--red)'}} />
                    <span style={{fontSize:'14px',color:'var(--text-muted)'}}>Not yet</span>
                  </label>
                </div>
                {form.venmo_paid==='no'&&<div style={{marginTop:'10px',fontSize:'12px',color:'var(--red)',padding:'8px 12px',background:'rgba(192,57,43,0.06)',borderRadius:'6px'}}>Please Venmo your entry fee before submitting — unpaid entries will be removed.</div>}
                {errors.venmo_paid&&<div className="error-msg" style={{marginTop:'6px'}}>{errors.venmo_paid}</div>}
              </div>
              <div className="alert alert-warning" style={{marginBottom:'20px'}}><strong>Your picks:</strong> {[1,2,3,4,5,6].map(g=>form[`group${g}_pick`]||`G${g}: none`).join(' · ')}</div>
              {errors.submit&&<div style={{color:'var(--red)',fontSize:'13px',marginBottom:'12px'}}>{errors.submit}</div>}
              <div style={{display:'flex',gap:'12px'}}>
                <button className="btn btn-outline" onClick={()=>setStep(2)}>← Back</button>
                <button className="btn btn-gold" onClick={submit} disabled={submitting}>
                  {submitting?<div style={{display:'flex',alignItems:'center',gap:'8px'}}><div className="spinner"></div>Submitting...</div>:'🏆 Submit Entry'}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function EditModal({entry,groupedField,onSave,onClose}) {
  const [form,setForm]=useState({group1_pick:entry.group1_pick,group2_pick:entry.group2_pick,group3_pick:entry.group3_pick,group4_pick:entry.group4_pick,group5_pick:entry.group5_pick,group6_pick:entry.group6_pick,tiebreaker_amateur:entry.tiebreaker_amateur,tiebreaker_birdies:entry.tiebreaker_birdies});
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const [saveErr,setSaveErr]=useState('');
  const save=async()=>{
    setSaving(true); setSaveErr('');
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/entries?id=eq.${entry.id}`, {
        method:'PATCH',
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify(form)
      });
      const text = await res.text();
      if(res.ok){ setSaved(true); setTimeout(()=>{onSave();onClose();},700); }
      else { setSaveErr(`Save failed (${res.status}): ${text}`); }
    } catch(e) { setSaveErr(`Error: ${e.message}`); }
    setSaving(false);
  };
  return (
    <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')onClose();}}>
      <div className="modal">
        <h3>Edit Entry</h3>
        <div className="modal-sub">Editing picks for <strong>{entry.participant_name}</strong></div>
        <div className="edit-grid">
          {[1,2,3,4,5,6].map(g=>(
            <div key={g} className="edit-group">
              <label>Group {g}{g<6?` (OWGR ${(g-1)*10+1}–${g*10})`:' (Field + Amateurs)'}</label>
              <select value={form[`group${g}_pick`]} onChange={e=>set(`group${g}_pick`,e.target.value)}>
                {(groupedField.find(gf=>gf.group===g)?.players||[]).map(p=>{const n=p.name||p.player_name;return <option key={n} value={n}>{n}{p.is_amateur?' (Am)':''}</option>;})}
              </select>
            </div>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'4px'}}>
          <div className="edit-group">
            <label>TB1 — Low Amateur</label>
            <select value={form.tiebreaker_amateur} onChange={e=>set('tiebreaker_amateur',e.target.value)}>
              {(groupedField.find(g=>g.group===6)?.players||[]).filter(p=>p.is_amateur).map(p=>{const n=p.name||p.player_name;return <option key={n} value={n}>{n}</option>;})}
            </select>
          </div>
          <div className="edit-group">
            <label>TB2 — Birdie Guess</label>
            <input type="number" value={form.tiebreaker_birdies} onChange={e=>set('tiebreaker_birdies',parseInt(e.target.value))} />
          </div>
        </div>
        <div style={{display:'flex',gap:'10px',marginTop:'20px',justifyContent:'flex-end'}}>
          {saveErr&&<div style={{color:'var(--red)',fontSize:'12px',marginBottom:'8px',width:'100%'}}>{saveErr}</div>}
          <button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary btn-sm" onClick={save} disabled={saving||saved}>{saved?'✓ Saved!':saving?'Saving...':'Save Changes'}</button>
        </div>
      </div>
    </div>
  );
}

function AdminView({loggedIn,onLogin,entries,standings,scores,field,cutLine,setCutLine,isCutMade,setIsCutMade,birdieCount,setBirdieCount,picksRevealed,setPicksRevealed,payouts,setPayouts,onRefresh,onEntriesChange,groupedField,espnDetails,espnField}) {
  const [pw,setPw]=useState('');
  const [pwErr,setPwErr]=useState('');
  const [tab,setTab]=useState('controls');
  const [cutInput,setCutInput]=useState(cutLine);
  const [editing,setEditing]=useState(null);
  const [confirmDelete,setConfirmDelete]=useState(null);

  const handleDelete = async (entry) => {
    const ok = await supabase.delete('entries', entry.id);
    if (ok) { onEntriesChange(); setConfirmDelete(null); }
  };

  if (!loggedIn) return (
    <div className="login-box">
      <div style={{fontSize:'32px',marginBottom:'12px'}}>🔒</div>
      <h2>Admin Access</h2>
      <p>Enter your admin password to manage the pool.</p>
      <div className="form-field" style={{marginBottom:'12px'}}>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" onKeyDown={e=>{if(e.key==='Enter'){if(pw===ADMIN_PASSWORD)onLogin();else setPwErr('Incorrect password');}}} />
        {pwErr&&<span className="error-msg">{pwErr}</span>}
      </div>
      <button className="btn btn-primary" style={{width:'100%'}} onClick={()=>{if(pw===ADMIN_PASSWORD)onLogin();else setPwErr('Incorrect password');}}>Sign In</button>
    </div>
  );

  return (
    <div>
      {editing&&<EditModal entry={editing} groupedField={groupedField} onSave={onEntriesChange} onClose={()=>setEditing(null)}/>}
      {confirmDelete&&(
        <div className="modal-overlay" onClick={e=>{if(e.target.className==='modal-overlay')setConfirmDelete(null);}}>
          <div className="modal" style={{maxWidth:'420px',textAlign:'center'}}>
            <div style={{fontSize:'32px',marginBottom:'12px'}}>🗑️</div>
            <h3 style={{marginBottom:'6px'}}>Delete Entry?</h3>
            <div className="modal-sub">This will permanently remove <strong>{confirmDelete.participant_name}</strong>'s entry. This cannot be undone.</div>
            <div style={{display:'flex',gap:'10px',justifyContent:'center',marginTop:'20px'}}>
              <button className="btn btn-outline btn-sm" onClick={()=>setConfirmDelete(null)}>Cancel</button>
              <button className="btn btn-sm" style={{background:'var(--red)',color:'white',border:'none'}} onClick={()=>handleDelete(confirmDelete)}>Yes, Delete</button>
            </div>
          </div>

        </div>
      )}
      <div className="tabs">
        {['controls','entries','tiebreakers','qa'].map(t=><button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t==='qa'?'Field QA':t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
      </div>

      {tab==='controls'&&(
        <div className="card">
          <div className="card-header"><h2>Pool Controls</h2></div>
          <div className="card-body">
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'20px'}}>
              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'12px',color:'var(--green)'}}>Data Source</h3>
                <div style={{fontSize:'13px',color:'var(--text-muted)',marginBottom:'12px'}}>Always pulling live from ESPN. Updates every 5 minutes automatically.</div>
                <button className="btn btn-outline" style={{width:'100%',fontSize:'13px'}} onClick={onRefresh}>Force Refresh Now</button>
              </div>
              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'10px',color:'var(--green)'}}>Picks Visibility</h3>
                <p style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'12px'}}>After the April 8th 8 PM ET deadline, picks are hidden until you reveal them here.</p>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',marginBottom:'10px'}}>
                  <input type="checkbox" checked={picksRevealed} onChange={e=>{setPicksRevealed(e.target.checked);try{localStorage.setItem('pickem_picks_revealed',e.target.checked);}catch{}}} style={{accentColor:'var(--green)',width:'15px',height:'15px'}} />
                  <div><div style={{fontSize:'13px',fontWeight:'500'}}>Reveal all picks publicly</div><div style={{fontSize:'11px',color:'var(--text-muted)'}}>Flip on after entries close April 8th 8 PM ET</div></div>
                </label>
                <div style={{fontSize:'12px',padding:'8px 12px',borderRadius:'6px',background:picksRevealed?'rgba(26,71,42,0.08)':'rgba(192,57,43,0.08)',color:picksRevealed?'var(--green)':'var(--red)'}}>
                  {picksRevealed?'✓ Picks visible to everyone':'🔒 Picks hidden from participants'}
                </div>
              </div>
              <div style={{background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
                <h3 style={{fontSize:'15px',marginBottom:'12px',color:'var(--green)'}}>Cut Line</h3>
                <label style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',marginBottom:'12px'}}>
                  <input type="checkbox" checked={isCutMade} onChange={e=>setIsCutMade(e.target.checked)} style={{accentColor:'var(--green)',width:'15px',height:'15px'}} />
                  <span style={{fontSize:'13px',fontWeight:'500'}}>Cut has been made (activate Friday)</span>
                </label>
                {isCutMade&&(
                  <div className="form-field">
                    <label>Cut Line Score</label>
                    <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                      <input type="number" value={cutInput} onChange={e=>setCutInput(e.target.value)} style={{width:'80px'}} />
                      <button className="btn btn-outline btn-sm" onClick={()=>setCutLine(parseInt(cutInput))}>Apply</button>
                    </div>
                    <small style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'3px'}}>Current: {fmt(cutLine)}</small>
                  </div>
                )}
              </div>
            </div>
            <div style={{marginTop:'20px',background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
              <h3 style={{fontSize:'15px',marginBottom:'10px',color:'var(--green)'}}>Pool Summary</h3>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:'12px'}}>
                {[{l:'Entries',v:entries.length},{l:'Leader',v:standings[0]?.participant_name?.split(' ')[0]||'—'},{l:'Top Score',v:standings[0]?fmt(standings[0].totalScore):'—'},{l:'Picks Shown',v:picksRevealed?'Yes':'No'},{l:'Cut Made',v:isCutMade?'Yes':'No'}].map(s=>(
                  <div key={s.l} style={{background:'white',borderRadius:'8px',padding:'12px',textAlign:'center'}}>
                    <div style={{fontSize:'11px',color:'var(--text-muted)',marginBottom:'4px',textTransform:'uppercase',letterSpacing:'0.6px'}}>{s.l}</div>
                    <div style={{fontSize:'18px',fontWeight:'500',color:'var(--green)'}}>{s.v}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
          <div style={{marginTop:'20px',background:'var(--cream-dark)',borderRadius:'10px',padding:'20px'}}>
            <h3 style={{fontSize:'15px',marginBottom:'4px',color:'var(--green)'}}>Payout Structure</h3>
            <p style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'14px'}}>Enter dollar amounts — these show publicly on the standings page once filled in.</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'10px'}}>
              {[1,2,3].map(p=>(
                <div key={p} style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                  <label style={{fontSize:'11px',fontWeight:'500',color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.6px'}}>{p===1?'1st':p===2?'2nd':p===3?'3rd':`${p}th`} Place</label>
                  <div style={{display:'flex',alignItems:'center',border:'1px solid var(--border)',borderRadius:'8px',overflow:'hidden',background:'white'}}>
                    <span style={{padding:'9px 8px 9px 12px',fontSize:'14px',color:'var(--text-muted)'}}>$</span>
                    <input type="number" min="0" value={payouts[p]} onChange={e=>setPayouts(prev=>{const next={...prev,[p]:e.target.value};try{localStorage.setItem('pickem_payouts',JSON.stringify(next));}catch{}return next;})} placeholder="0" style={{border:'none',outline:'none',padding:'9px 12px 9px 4px',fontSize:'14px',fontFamily:"'Inter',sans-serif",width:'100%',background:'transparent'}} />
                  </div>
                </div>
              ))}
            </div>
            {Object.values(payouts).some(v=>v)&&(
              <div style={{marginTop:'10px',fontSize:'12px',color:'var(--green)'}}>
                Total pot: ${Object.values(payouts).reduce((s,v)=>s+(parseFloat(v)||0),0).toLocaleString()}
              </div>
            )}
          </div>
        </div>
      )}

      {tab==='entries'&&(
        <div className="card">
          <div className="card-header">
            <h2>All Entries ({entries.length})</h2>
            <div style={{fontSize:'12px',color:'var(--text-muted)'}}>Click Edit to change picks before the tournament starts</div>
          </div>
          <div style={{overflowX:'auto'}}>
            <table className="admin-table">
              <thead><tr><th>#</th><th>Name</th><th>G1</th><th>G2</th><th>G3</th><th>G4</th><th>G5</th><th>G6</th><th>TB Amat</th><th>TB Birds</th><th>Score</th><th>Date</th><th></th></tr></thead>
              <tbody>{entries.map((e,i)=>{
                const s=standings.find(x=>x.id===e.id);
                return (
                  <tr key={e.id}>
                    <td style={{color:'var(--text-muted)'}}>{i+1}</td>
                    <td style={{fontWeight:'500'}}>{e.participant_name}</td>
                    <td>{e.group1_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group2_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group3_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group4_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group5_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.group6_pick?.split(' ').slice(-1)[0]}</td>
                    <td>{e.tiebreaker_amateur?.split(' ').slice(-1)[0]}</td>
                    <td>{e.tiebreaker_birdies}</td>
                    <td><span className={`score-val ${sc(s?.totalScore)}`} style={{fontWeight:'600'}}>{s?fmt(s.totalScore):'—'}</span></td>
                    <td style={{color:'var(--text-muted)'}}>{new Date(e.created_at).toLocaleDateString()}</td>
                    <td style={{display:'flex',gap:'6px'}}>
                      <button className="btn btn-outline btn-sm" onClick={()=>setEditing(e)}>Edit</button>
                      <button className="btn btn-sm" style={{background:'transparent',border:'1px solid var(--red)',color:'var(--red)'}} onClick={()=>setConfirmDelete(e)}>Delete</button>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
          </div>
        </div>
      )}

      {tab==='qa'&&(
        <div className="card">
          <div className="card-header"><h2>Field QA</h2><div style={{fontSize:'12px',color:'var(--text-muted)'}}>ESPN names vs your defined field</div></div>
          <div className="card-body">
            {(()=>{
              const fieldNames = MOCK_FIELD.map(p=>p.name);
              const espnNames = espnField.map(p=>p.name);
              if (espnNames.length===0) return <div style={{padding:'20px',color:'var(--text-muted)',fontSize:'13px'}}>No ESPN data yet — force refresh or wait for tee times to be posted.</div>;
              const matched = fieldNames.filter(n=>espnNames.includes(n));
              const missingFromEspn = fieldNames.filter(n=>!espnNames.includes(n));
              const notInOurField = espnNames.filter(n=>!fieldNames.includes(n));
              return (
                <div style={{display:'grid',gap:'20px'}}>
                  <div style={{background:'rgba(26,71,42,0.06)',borderRadius:'10px',padding:'16px'}}>
                    <div style={{fontWeight:'600',color:'var(--green)',marginBottom:'8px'}}>✅ Matched ({matched.length})</div>
                    <div style={{fontSize:'12px',color:'var(--text-muted)',lineHeight:'1.8'}}>{matched.join(', ')}</div>
                  </div>
                  {missingFromEspn.length>0&&<div style={{background:'rgba(192,57,43,0.06)',borderRadius:'10px',padding:'16px'}}>
                    <div style={{fontWeight:'600',color:'var(--red)',marginBottom:'8px'}}>⚠️ In our field but NOT on ESPN ({missingFromEspn.length}) — name mismatch or WD</div>
                    <div style={{fontSize:'12px',lineHeight:'1.8'}}>{missingFromEspn.map(n=><div key={n} style={{padding:'4px 0',borderBottom:'1px solid var(--border)'}}><strong>{n}</strong></div>)}</div>
                  </div>}
                  {notInOurField.length>0&&<div style={{background:'rgba(201,168,76,0.08)',borderRadius:'10px',padding:'16px'}}>
                    <div style={{fontWeight:'600',color:'var(--gold)',marginBottom:'8px'}}>⚠️ On ESPN but NOT in our field ({notInOurField.length}) — missing player</div>
                    <div style={{fontSize:'12px',lineHeight:'1.8'}}>{notInOurField.map(n=><div key={n} style={{padding:'4px 0',borderBottom:'1px solid var(--border)'}}><strong>{n}</strong></div>)}</div>
                  </div>}
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {tab==='tiebreakers'&&(
        <div className="card">
          <div className="card-header"><h2>Tiebreaker Resolution</h2></div>
          <div className="card-body">
            <div style={{maxWidth:'600px'}}>
              <div className="form-field" style={{marginBottom:'20px'}}>
                <label>Actual Final Round Birdie Count (T10 and above)</label>
                <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                  <input type="number" value={birdieCount} onChange={e=>setBirdieCount(e.target.value)} placeholder="Enter actual count" style={{width:'140px'}} />
                </div>
                <small style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'3px'}}>Enter after the final round to see who was closest</small>
              </div>
              <div className="tiebreaker-panel">
                <h4>Birdie Tiebreaker — All Entries</h4>
                {entries.length===0?<p style={{fontSize:'13px',color:'var(--text-muted)'}}>No entries yet.</p>:(
                  [...entries].sort((a,b)=>{
                    if(!birdieCount)return 0;
                    return Math.abs(a.tiebreaker_birdies-parseInt(birdieCount))-Math.abs(b.tiebreaker_birdies-parseInt(birdieCount));
                  }).map(e=>{
                    const diff=birdieCount?Math.abs(e.tiebreaker_birdies-parseInt(birdieCount)):null;
                    return (
                      <div key={e.id} className="tiebreaker-row">
                        <span style={{fontWeight:'500',minWidth:'140px'}}>{e.participant_name}</span>
                        <span style={{color:'var(--text-muted)',fontSize:'12px'}}>Guessed <strong style={{color:'var(--text)'}}>{e.tiebreaker_birdies}</strong></span>
                        {birdieCount&&<span style={{color:'var(--green-light)',fontSize:'12px',fontWeight:'500'}}>Off by {diff}</span>}
                        <span style={{color:'var(--text-muted)',fontSize:'12px'}}>Amateur: {e.tiebreaker_amateur?.split(' ').slice(-1)[0]}</span>
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
